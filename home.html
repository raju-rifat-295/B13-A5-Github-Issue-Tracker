<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <header
        class="flex flex-col md:flex-row items-center justify-between px-4 md:px-15 py-4 gap-4 bg-white border-b-2 border-b-[#E4E4E4] sticky z-10 top-0">
        <div class="flex gap-2 items-center w-full md:w-auto justify-center md:justify-start">
            <img class="size-[37px]" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-xl md:text-2xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex flex-col sm:flex-row items-center gap-2 md:gap-4 w-full md:w-auto">
            <div
                class="border-[1.5px] w-full sm:w-[300px] h-11 px-4 py-3.5 rounded-md border-gray-300 text-[#64748B] gap-2 flex items-center">
                <i class="fa-brands fa-sistrix"></i>
                <input id="input" class="border-none w-full focus:outline-none" type="text"
                    placeholder="Search issues...">
            </div>
            <button id="search-btn"
                class="w-full sm:w-[131px] h-11 bg-[#4A00FF] font-semibold text-white rounded-md shrink-0">Search</button>
        </div>
    </header>

    <main id="main" class="min-h-screen bg-[#f8fafc] flex justify-center px-4 md:px-6">
        <div class="main-container w-full max-w-[1110px] pb-10">

            <nav
                class="w-full h-auto min-h-[88px] mt-[30px] md:mt-[60px] bg-white rounded-md p-4 md:p-6 shadow-[0_1px_6px_0_rgba(0,0,0,0.08)] flex items-center">
                <div class="nav-btn-container flex flex-wrap gap-2 md:gap-4 w-full">
                    <button onclick="toggleStyle('all-btn')" id="all-btn"
                        class="flex-1 sm:flex-none w-auto min-w-[100px] sm:w-[131px] h-11 border-2 border-[#E4E4E7] bg-[#4A00FF] text-white font-semibold rounded-md">All</button>

                    <button onclick="toggleStyle('open-btn')" id="open-btn"
                        class="flex-1 sm:flex-none w-auto min-w-[100px] sm:w-[131px] h-11 border-2 border-[#E4E4E7] text-[#64748B] font-semibold rounded-md">Open</button>

                    <button onclick="toggleStyle('closed-btn')" id="closed-btn"
                        class="flex-1 sm:flex-none w-auto min-w-[100px] sm:w-[131px] h-11 border-2 border-[#E4E4E7] text-[#64748B] font-semibold rounded-md">Closed</button>
                </div>
            </nav>

            <div class="w-full mt-[30px] md:mt-[60px] overflow-hidden rounded-md shadow-[0_1px_6px_0_rgba(0,0,0,0.08)]">

                <section
                    class="issue-count-container bg-[#FFFFFF] p-4 md:p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="flex items-center gap-2">
                        <img class="size-12" src="./assets/Aperture.png" alt="">
                        <div>
                            <h2 class="font-semibold text-[20px]"><span id="count">50</span> Issues</h2>
                            <p class="text-[#64748B] font-normal text-sm md:text-base">Track and manage your project
                                issues</p>
                        </div>
                    </div>

                    <div class="flex gap-4 items-center">
                        <div class="flex gap-1 items-center">
                            <img class="size-6" src="./assets/Open-Status.png" alt="">
                            <p class="text-sm md:text-base">Open</p>
                        </div>
                        <div class="flex gap-1 items-center">
                            <img class="size-6" src="./assets/Closed- Status .png" alt="">
                            <p class="text-sm md:text-base">Closed</p>
                        </div>
                    </div>
                </section>

                <hr class="border-gray-300">

                <div id="cards-container"
                    class="bg-[#FBFBFB] p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                </div>

                <div id="open-container"
                    class="bg-[#FBFBFB] p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 hidden">
                </div>

                <div id="closed-container"
                    class="bg-[#FBFBFB] p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 hidden">
                </div>

                <div id="search-container"
                    class="bg-[#FBFBFB] p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 hidden">
                </div>
            </div>

        </div>
    </main>

    <section id="modal-container">
        <dialog id="my_modal_1" class="modal">
        </dialog>
    </section>

    <script src="scripts/home.js"></script>
</body>

</html>

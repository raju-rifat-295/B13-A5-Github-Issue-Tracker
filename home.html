<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css -->
    <link rel="stylesheet" href="style.css">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- daisyUI and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <header class="flex items-center justify-between px-15 py-[17px] border-b-2 border-b-[#E4E4E4]">
        <div class="flex gap-2 items-center ">
            <img class="size-[37px]" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex items-center gap-4">
            <div class="border-[1.5px] w-[300px] h-11 px-4 py-3.5 rounded-md  border-gray-300 text-[#64748B] gap-1 flex items-center">
                <i class="fa-brands fa-sistrix"></i>
                <input class="border-none focus:outline-none" type="text" name="" id="" placeholder="Search issues...">
            </div>
            <button class="w-[131px] h-11 bg-[#4A00FF] font-semibold text-white rounded-md">+ New Issue</button>
        </div>

    </header>


    <script src="scripts/home.js"></script>
</body>

</html>

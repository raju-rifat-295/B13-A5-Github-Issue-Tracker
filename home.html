    <header
        class="flex items-center justify-between px-15 py-[17px] bg-white border-b-2 border-b-[#E4E4E4] sticky z-10 top-0">
        <div class="flex gap-2 items-center ">
            <img class="size-[37px]" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex items-center gap-4">
            <div

                <i class="fa-brands fa-sistrix"></i>
                <input id="input" class="border-none focus:outline-none" type="text" name="" id="" placeholder="Search issues...">
            </div>
            <button id="search-btn" class="w-[131px] h-11 bg-[#4A00FF] font-semibold text-white rounded-md">Search</button>
        </div>

    </header>

                    <button onclick="toggleStyle('all-btn')" id="all-btn"
                        class=" w-[131px] h-11 border-2 border-[#E4E4E7]  bg-[#4A00FF] text-white font-semibold  rounded-md">All</button>

                    <button onclick="toggleStyle('open-btn')" id="open-btn"
                        class=" w-[131px] h-11 border-2 border-[#E4E4E7]  text-[#64748B] font-semibold rounded-md">Open</button>

                    <button onclick="toggleStyle('closed-btn')" id="closed-btn"
                        class=" w-[131px] h-11 border-2 border-[#E4E4E7]  text-[#64748B] font-semibold rounded-md">Closed</button>
                </div>
            </nav>

            <!-- issue section -->

                <!-- issue count -->

                    <div class="flex items-center gap-2">
                        <img class="size-12" src="./assets/Aperture.png" alt="">
                        <div>
                            <h2 class="font-semibold text-[20px]"><span id="count">50</span> Issues</h2>
                            <p class="text-[#64748B] font-normal">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="flex gap-4 items-center">
                        <div class="flex gap-1 items-center">
                            <img class="size-6" src="./assets/Open-Status.png" alt="">
                            <p>Open</p>
                        </div>
                        <div class="flex gap-1 items-center">
                            <img class="size-6" src="./assets/Closed- Status .png" alt="">
                            <p>Closed</p>
                        </div>
                    </div>
                </section>

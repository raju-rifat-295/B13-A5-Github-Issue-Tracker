<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css -->
    <link rel="stylesheet" href="style.css">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- daisyUI and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>

    <div class="login-container min-h-screen bg-[#F8FAFC] flex justify-center items-center">
        <div class="login w-1/3  bg-[#FFFFFF] p-8 flex flex-col space-y-6">
            <div class="login-banner flex flex-col items-center">
                <img class="size-[100px] mb-6" src="./assets/github-logo.png" alt="">
                <h2 class="font-semibold text-2xl mb-1">GitHub Issues Tracker</h2>
                <p class="text-[#64748B] text-[16px]">Sign in to manage your issues</p>
            </div>

            <fieldset class="fieldset flex flex-col justify-center items-center">

                <div class=" w-full">
                    <div class="flex flex-col mb-4 space-y-2">
                        <label class="label font-medium text-black">Username</label>
                        <input type="text" class="input w-full" placeholder="Enter Username" />
                        <p class="text-[#4A00FF]">Default: admin</p>
                    </div>

                    <div class="flex flex-col space-y-2">
                        <label class="label font-medium text-black">Password</label>
                        <input type="password" class="input w-full" placeholder="Enter Password" />
                        <p class="text-[#4A00FF]">Default: admin</p>
                    </div>
                </div>

                <button class="w-full btn mt-6 bg-[#4A00FF] text-white">Sign In</button>
            </fieldset>

            <div class="flex items-center w-full">
                <hr class="grow border-gray-300">
                <span class="px-2 text-black">OR</span>
                <hr class="grow border-gray-300">
            </div>

            <div class="demo-credintail flex flex-col justify-center items-center ">
                <p class="text-[#64748B] text-[14px]">Demo Credentials:</p>
                <div class="mt-2 py-6 px-[148px] bg-[#F8FAFC] w-full flex flex-col justify-center items-center">
                    <p class="font-semibold text-[16px] flex flex-nowrap">Username:<span
                            class="font-normal ml-1">admin</span></p>
                    <p class="font-semibold text-[16px] flex flex-nowrap">Password:<span
                            class="font-normal ml-1">admin123</span></p>
                </div>
            </div>
        </div>

    </div>

    <script src="./scripts/login.js"></script>
</body>

</html>
